<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Stig Parceiro · Restaurante</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&display=swap');
:root{
  --cream:#F5F0E8;--cream2:#EDE8DE;--cream3:#E4DDD0;
  --ink:#1A1208;--ink2:#4A3E2E;--ink3:#8A7B66;--ink4:rgba(26,18,8,0.12);
  --or:#E8451A;--or-d:rgba(232,69,26,0.10);--or-b:rgba(232,69,26,0.25);
  --gr:#2A7A3B;--gr-d:rgba(42,122,59,0.10);--gr-b:rgba(42,122,59,0.25);
  --bl:#1A4A7A;--bl-d:rgba(26,74,122,0.08);--bl-b:rgba(26,74,122,0.2);
  --am:#B45309;--am-d:rgba(180,83,9,0.1);--am-b:rgba(180,83,9,0.25);
  --rd:#B91C1C;--rd-d:rgba(185,28,28,0.1);--rd-b:rgba(185,28,28,0.25);
  --bd:rgba(26,18,8,0.07);--bd2:rgba(26,18,8,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:#2A2218;font-family:'DM Sans',sans-serif;color:var(--ink);display:flex;justify-content:center;align-items:center;}
.shell{width:390px;height:844px;background:var(--cream);border-radius:48px;border:1.5px solid rgba(255,255,255,0.12);overflow:hidden;position:relative;box-shadow:0 40px 80px rgba(0,0,0,0.6);display:flex;flex-direction:column;}
.notch{width:120px;height:34px;background:var(--cream);border-radius:0 0 20px 20px;position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:200;}
.topbar{height:58px;background:var(--cream);border-bottom:.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;z-index:99;margin-top:10px;}
.topbar-logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:var(--ink);letter-spacing:-1px;}
.topbar-logo em{color:var(--or);font-style:italic;}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;display:none;scrollbar-width:none;padding-bottom:72px;background:var(--cream);}
.screen::-webkit-scrollbar{display:none;}
.screen.active{display:block;}
.bnav{height:68px;background:var(--cream);border-top:.5px solid var(--bd);display:flex;align-items:center;padding:0 4px 8px;flex-shrink:0;z-index:99;}
.bni{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:5px;border-radius:10px;flex:1;transition:.15s;}
.bni.active{background:var(--or-d);}
.bni-icon{font-size:18px;line-height:1.2;opacity:0.28;}
.bni.active .bni-icon{opacity:1;}
.bni-lbl{font-size:8px;font-weight:500;color:var(--ink3);}
.bni.active .bni-lbl{color:var(--or);font-weight:600;}
.ph{padding:14px 20px 12px;}
.ph h1{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--ink);margin-bottom:2px;}
.ph p{font-size:12px;color:var(--ink3);}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 20px;margin-bottom:14px;}
.stat-box{background:var(--cream2);border:.5px solid var(--bd2);border-radius:13px;padding:13px;}
.stat-box.wide{grid-column:span 2;}
.stat-label{font-size:9px;font-weight:700;color:var(--ink3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px;}
.stat-val{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--ink);}
.stat-sub{font-size:10px;color:var(--ink3);margin-top:2px;}
.btn{border:none;border-radius:12px;padding:12px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;width:100%;}
.btn-ink{background:var(--ink);color:var(--cream);}
.inp{width:100%;background:var(--cream2);border:.5px solid var(--bd2);border-radius:10px;color:var(--ink);padding:12px 14px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:10px;}
.toggle{width:42px;height:23px;border-radius:12px;position:relative;cursor:pointer;transition:.25s;flex-shrink:0;}
.toggle.on{background:var(--gr);}
.toggle.off{background:var(--ink3);}
.toggle::after{content:'';position:absolute;width:17px;height:17px;background:#fff;border-radius:50%;top:3px;transition:.25s;}
.toggle.on::after{right:3px;}
.toggle.off::after{left:3px;}
.badge{font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;flex-shrink:0;}
.badge-new{background:var(--or-d);color:var(--or);border:.5px solid var(--or-b);}
.badge-prep{background:var(--am-d);color:var(--am);border:.5px solid var(--am-b);}
.badge-ready{background:var(--gr-d);color:var(--gr);border:.5px solid var(--gr-b);}
.badge-deliver{background:var(--bl-d);color:var(--bl);border:.5px solid var(--bl-b);}
.badge-done{background:var(--cream3);color:var(--ink3);border:.5px solid var(--bd2);}
.order-card{background:var(--cream2);border:.5px solid var(--bd2);border-radius:14px;padding:13px 15px;margin:0 20px 9px;}
.order-card.is-new{border-color:var(--or-b);background:var(--or-d);animation:newPulse 2s infinite;}
@keyframes newPulse{0%,100%{box-shadow:0 0 0 0 var(--or-b);}50%{box-shadow:0 0 0 6px transparent;}}
.menu-row{display:flex;align-items:center;gap:11px;padding:10px 20px;border-bottom:.5px solid var(--bd);}
.toast{position:absolute;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--ink);color:var(--cream);border-radius:10px;padding:10px 18px;font-size:12px;font-weight:500;opacity:0;transition:.3s;pointer-events:none;z-index:999;white-space:nowrap;max-width:320px;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
/* MOBILE */
@media (max-width: 430px) {
  html, body { display: block !important; overflow: auto !important; background: var(--cream) !important; }
  .shell { width: 100vw !important; height: 100dvh !important; border-radius: 0 !important; border: none !important; box-shadow: none !important; }
  .bnav { position: fixed !important; bottom: 0 !important; left: 0 !important; right: 0 !important; z-index: 999 !important; padding-bottom: calc(8px + env(safe-area-inset-bottom)) !important; background: var(--cream) !important; border-top: .5px solid var(--bd) !important; height: auto !important; }
  .screen { padding-bottom: calc(72px + env(safe-area-inset-bottom)) !important; height: calc(100dvh - 58px) !important; overflow-y: auto !important; }
  .topbar { padding-top: env(safe-area-inset-top) !important; height: calc(58px + env(safe-area-inset-top)) !important; position: sticky !important; top: 0 !important; z-index: 99 !important; }
}
</style>
</head>
<body>
<div class="shell">
<div class="notch"></div>

<div class="topbar">
  <div class="topbar-logo">S<em>tig</em> Parceiro</div>
  <div style="display:flex;align-items:center;gap:8px;">
    <span style="font-size:10px;color:var(--gr);font-weight:600;" id="rest-status-lbl">● aberto</span>
    <div class="toggle on" id="rest-toggle" onclick="toggleRestStatus(this)"></div>
  </div>
</div>

<div class="screen active" id="sc-dash">
  <div class="ph">
    <h1 id="rest-nome-dash">Dashboard Real</h1>
    <p>Conectado ao Supabase</p>
  </div>
  <div class="stat-grid">
    <div class="stat-box">
      <div class="stat-label">pedidos hoje</div>
      <div class="stat-val" id="d-ped">0</div>
      <div class="stat-sub" id="d-ped-sub">nenhum ainda</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">faturamento</div>
      <div class="stat-val" style="color:var(--gr);" id="d-fat">R$0</div>
      <div class="stat-sub">ticket médio <span id="d-ticket">—</span></div>
    </div>
    <div class="stat-box wide">
      <div class="stat-label">economia vs iFood</div>
      <div class="stat-val" style="color:var(--or);" id="d-eco">R$0</div>
      <div class="stat-sub">15% de comissão evitada</div>
    </div>
  </div>
</div>

<div class="screen" id="sc-pedidos">
  <div class="ph" style="display:flex;justify-content:space-between;align-items:flex-end;">
    <div><h1>Pedidos</h1><p id="ped-count">0 na fila</p></div>
    <button onclick="carregarBanco()" style="background:var(--or-d);color:var(--or);border:.5px solid var(--or-b);border-radius:10px;padding:6px 13px;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;">↻ Atualizar</button>
  </div>
  <div id="orders-list"></div>
</div>

<div class="screen" id="sc-cardapio">
  <div class="ph" style="display:flex;justify-content:space-between;align-items:flex-end;">
    <div><h1>Cardápio</h1><p id="menu-count">0 itens no banco</p></div>
  </div>
  <div style="background:var(--cream2);border:.5px solid var(--bd2);border-radius:13px;padding:13px;margin:0 20px 12px;">
    <div style="font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">adicionar prato</div>
    <div style="display:flex;gap:7px;margin-bottom:7px;">
      <input class="inp" id="ci-nome" placeholder="nome do prato" style="flex:2;margin-bottom:0;">
      <input class="inp" id="ci-emoji" placeholder="🍕" style="flex:0 0 52px;margin-bottom:0;text-align:center;">
    </div>
    <div style="display:flex;gap:7px;">
      <input class="inp" id="ci-preco" placeholder="R$ preço" type="number" style="flex:1;margin-bottom:0;">
      <select style="flex:1;background:var(--cream2);border:.5px solid var(--bd2);border-radius:10px;color:var(--ink);padding:12px 10px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;" id="ci-cat">
        <option>Italiana</option><option>Hamburguer</option><option>Saudável</option><option>Japonesa</option>
      </select>
    </div>
    <button onclick="addCadItem()" style="width:100%;background:var(--ink);color:var(--cream);border:none;border-radius:10px;padding:11px;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:8px;">+ Salvar no Banco</button>
  </div>
  <div id="menu-list"></div>
</div>

<div class="bnav" id="rest-bnav">
  <div class="bni active" id="nav-dash" onclick="navR('dash')"><div class="bni-icon">📊</div><div class="bni-lbl">dashboard</div></div>
  <div class="bni" id="nav-pedidos" onclick="navR('pedidos')"><div class="bni-icon">🧾</div><div class="bni-lbl">pedidos</div></div>
  <div class="bni" id="nav-cardapio" onclick="navR('cardapio')"><div class="bni-icon">🍽️</div><div class="bni-lbl">cardápio</div></div>
</div>
<div class="toast" id="toast"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
let menuItems=[],orders=[],totalFat=0;
const $=id=>document.getElementById(id);
function showToast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function navR(p){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.querySelectorAll('.bni').forEach(n=>n.classList.remove('active'));$('sc-'+p).classList.add('active');$('nav-'+p).classList.add('active');}

const _supa = supabase.createClient('https://kkflzxpwnpnhdhghgsph.supabase.co', 'sb_publishable_DYXRtVLjF0CgFvCaa9VHTg_OVZIi3YB');

const STATUS_FLOW={novo:'prep',prep:'pronto',pronto:'entrega',entrega:'concluido'};
const STATUS_LBL={novo:'novo',prep:'preparando',pronto:'pronto',entrega:'a caminho',concluido:'concluído'};
const STATUS_CLS={novo:'badge-new',prep:'badge-prep',pronto:'badge-ready',entrega:'badge-deliver',concluido:'badge-done'};

async function carregarBanco() {
  const { data: pratos } = await _supa.from('stig_pratos').select('*').order('created_at', { ascending: false });
  if (pratos) {
    menuItems = pratos.map(p => ({ db_id: p.db_id, nome: p.name, preco: p.price, emoji: p.emoji, cat: p.category }));
    renderMenu();
  }
  const { data: peds } = await _supa.from('stig_pedidos').select('*').order('created_at', { ascending: false });
  if (peds) {
    orders = peds.map(o => ({ id: o.id, db_id: o.db_id, items: o.items, val: o.total_value, status: o.status, time: o.time }));
    totalFat = orders.reduce((acc, curr) => acc + parseFloat(curr.val), 0);
    renderOrders(); renderDash();
  }
}
carregarBanco();
setInterval(carregarBanco, 5000); // Atualiza os pedidos a cada 5s

async function addCadItem() {
  const nome=$('ci-nome').value.trim(), preco=parseFloat($('ci-preco').value)||0, emoji=$('ci-emoji').value||'🍽️', cat=$('ci-cat').value;
  if(!nome){ showToast('⚠️ informe o nome'); return; }
  showToast('⏳ Salvando no banco...');
  await _supa.from('stig_pratos').insert([{ name: nome, price: preco, emoji: emoji, category: cat }]);
  $('ci-nome').value=''; $('ci-preco').value=''; showToast('✅ Prato salvo!');
  carregarBanco();
}

async function deletarItem(id) {
  await _supa.from('stig_pratos').delete().eq('db_id', id);
  carregarBanco();
}

async function advance(db_id, currentStatus) {
  if(!STATUS_FLOW[currentStatus]) return;
  const nextStatus = STATUS_FLOW[currentStatus];
  await _supa.from('stig_pedidos').update({ status: nextStatus }).eq('db_id', db_id);
  showToast('✅ Status atualizado no banco!');
  carregarBanco();
}

function renderDash() {
  $('d-ped').textContent=orders.length;
  $('d-fat').textContent='R$'+totalFat.toFixed(2);
  $('d-eco').textContent='R$'+(totalFat*0.15).toFixed(2);
}

function renderMenu() {
  $('menu-count').textContent=menuItems.length+' itens';
  $('menu-list').innerHTML=menuItems.length ? menuItems.map(item => `
    <div class="menu-row">
      <div style="width:36px;height:36px;border-radius:9px;background:var(--cream2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;">${item.emoji}</div>
      <div style="flex:1;"><div style="font-size:12px;font-weight:600;color:var(--ink);">${item.nome}</div><div style="font-size:10px;color:var(--ink3);">${item.cat}</div></div>
      <span style="font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--or);margin-right:8px;">R$${parseFloat(item.preco).toFixed(2)}</span>
      <button onclick="deletarItem('${item.db_id}')" style="background:transparent;border:none;color:var(--rd);font-size:18px;cursor:pointer;">✕</button>
    </div>`).join('') : `<div style="text-align:center;padding:40px;color:var(--ink3);">cardápio vazio</div>`;
}

function renderOrders() {
  $('ped-count').textContent = orders.length + ' na fila';
  $('orders-list').innerHTML = orders.map(o => `
    <div class="order-card ${o.status==='novo'?'is-new':''}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;">
        <div style="font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--ink);">#${o.id} <span style="font-size:10px;color:var(--ink3);font-family:'DM Sans',sans-serif;font-weight:400;">${o.time}</span></div>
        <span class="badge ${STATUS_CLS[o.status]||'badge-done'}">${STATUS_LBL[o.status]}</span>
      </div>
      <div style="font-size:12px;color:var(--ink3);margin-bottom:8px;">${o.items}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--or);">R$${o.val}</span>
        ${STATUS_FLOW[o.status]?`<button onclick="advance('${o.db_id}', '${o.status}')" style="background:var(--ink);color:var(--cream);border:none;border-radius:9px;padding:5px 13px;font-size:10px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;">→ ${STATUS_LBL[STATUS_FLOW[o.status]]}</button>`:'<span style="font-size:10px;color:var(--ink3);">finalizado</span>'}
      </div>
    </div>`).join('');
}
function toggleRestStatus(el){el.classList.toggle('on');el.classList.toggle('off');const on=el.classList.contains('on');$('rest-status-lbl').textContent=on?'● aberto':'○ fechado';$('rest-status-lbl').style.color=on?'var(--gr)':'var(--ink3)';}
</script>
</body>
</html>
