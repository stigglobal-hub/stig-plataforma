<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Stig Moto · Entregador</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&display=swap');
:root{
  --cream:#F5F0E8;--cream2:#EDE8DE;--cream3:#E4DDD0;
  --ink:#1A1208;--ink2:#4A3E2E;--ink3:#8A7B66;
  --or:#E8451A;--or-d:rgba(232,69,26,0.10);--or-b:rgba(232,69,26,0.25);
  --gr:#2A7A3B;--bl:#1A4A7A;--rd:#B91C1C;
  --bd:rgba(26,18,8,0.07);--bd2:rgba(26,18,8,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:#2A2218;font-family:'DM Sans',sans-serif;color:var(--ink);display:flex;justify-content:center;align-items:center;}
.shell{width:390px;height:844px;background:var(--cream);border-radius:48px;border:1.5px solid rgba(255,255,255,0.12);overflow:hidden;position:relative;box-shadow:0 40px 80px rgba(0,0,0,0.6);display:flex;flex-direction:column;}
.notch{width:120px;height:34px;background:var(--cream);border-radius:0 0 20px 20px;position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:200;}
.topbar{height:58px;background:var(--cream);border-bottom:.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;z-index:99;margin-top:10px;}
.topbar-logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:var(--ink);letter-spacing:-1px;}
.topbar-logo em{color:var(--or);font-style:italic;}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;display:none;scrollbar-width:none;padding-bottom:72px;background:var(--cream);}
.screen.active{display:block;}
.corrida-card{background:var(--cream2);border:.5px solid var(--bd2);border-radius:16px;padding:14px 16px;margin:0 20px 12px;}
.corrida-nova{border-color:var(--or-b);background:var(--or-d);animation:novaPulse 2s infinite;}
@keyframes novaPulse{0%,100%{box-shadow:0 0 0 0 var(--or-b);}50%{box-shadow:0 0 0 8px transparent;}}
.toast{position:absolute;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--ink);color:var(--cream);border-radius:10px;padding:10px 18px;font-size:12px;font-weight:500;opacity:0;transition:.3s;pointer-events:none;z-index:999;white-space:nowrap;max-width:320px;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
/* MOBILE */
@media (max-width: 430px) {
  html, body { display: block !important; overflow: auto !important; background: var(--cream) !important; }
  .shell { width: 100vw !important; height: 100dvh !important; border-radius: 0 !important; border: none !important; box-shadow: none !important; }
  .screen { padding-bottom: calc(72px + env(safe-area-inset-bottom)) !important; height: calc(100dvh - 58px) !important; overflow-y: auto !important; }
  .topbar { padding-top: env(safe-area-inset-top) !important; height: calc(58px + env(safe-area-inset-top)) !important; position: sticky !important; top: 0 !important; z-index: 99 !important; }
}
</style>
</head>
<body>
<div class="shell">
<div class="notch"></div>

<div class="topbar">
  <div class="topbar-logo">S<em>tig</em> <span style="font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;color:var(--ink3);">moto</span></div>
  <div style="font-size:10px;color:#2A7A3B;font-weight:600;">● online</div>
</div>

<div class="screen active" id="sc-home">
  <div style="padding:16px 20px 12px;">
    <div style="font-size:12px;color:var(--ink3);">olá, entregador</div>
    <div style="font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--ink);margin-top:2px;">Radar de <em style="color:var(--or);">Corridas</em></div>
  </div>

  <div style="background:var(--ink);border-radius:18px;padding:18px;margin:0 20px 14px;text-align:center;">
    <div style="font-size:10px;color:rgba(245,240,232,0.5);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;">frete 100% repassado</div>
    <div style="font-family:'Playfair Display',serif;font-size:40px;font-weight:900;color:#86EFAC;" id="saldo-val">R$ 0,00</div>
  </div>

  <div id="nova-corrida-box"></div>

  <div style="padding:0 20px;">
    <button onclick="buscarPedidoReal()" style="width:100%;background:var(--cream2);color:var(--ink2);border:.5px solid var(--bd2);border-radius:13px;padding:15px;font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;">↻ Buscar Pedidos no Banco</button>
  </div>
</div>
<div class="toast" id="toast"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const $=id=>document.getElementById(id);
function showToast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

const _supa = supabase.createClient('https://kkflzxpwnpnhdhghgsph.supabase.co', 'sb_publishable_DYXRtVLjF0CgFvCaa9VHTg_OVZIi3YB');
let idPedidoAtual = null;
let saldo = 0;

async function buscarPedidoReal() {
  $('nova-corrida-box').innerHTML = '<div style="text-align:center;padding:20px;color:var(--ink3);">Buscando...</div>';
  
  // Traz o pedido se foi recém-criado (novo), aceito pelo restaurante (prep) ou está pronto (pronto)
  const { data: peds } = await _supa.from('stig_pedidos').select('*').in('status', ['novo', 'prep', 'pronto']).order('created_at', { ascending: false });
  
  if (peds && peds.length > 0) {
    const o = peds[0];
    idPedidoAtual = o.db_id;
    
    $('nova-corrida-box').innerHTML=`
      <div class="corrida-card corrida-nova" style="margin-bottom:12px;">
        <div style="text-align:center;margin-bottom:10px;">
          <div style="background:var(--or);color:#fff;font-size:9px;font-weight:700;padding:3px 10px;border-radius:20px;">🔔 NOVA CORRIDA</div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
          <div><div style="font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--ink);">${o.items}</div><div style="font-size:10px;color:var(--ink3);margin-top:1px;">Pedido #${o.id}</div></div>
          <div style="text-align:right;"><div style="font-family:'Playfair Display',serif;font-size:18px;font-weight:900;color:#2A7A3B;">R$8.50</div><div style="font-size:9px;color:var(--ink3);">frete</div></div>
        </div>
        <div style="display:flex;gap:8px;">
          <button onclick="recusar()" style="flex:1;background:transparent;color:#B91C1C;border:.5px solid rgba(185,28,28,0.25);border-radius:12px;padding:11px;font-size:12px;font-weight:600;cursor:pointer;">✕ recusar</button>
          <button onclick="aceitarReal()" style="flex:1;background:#2A7A3B;color:#fff;border:none;border-radius:12px;padding:11px;font-size:12px;font-weight:700;cursor:pointer;">✓ aceitar</button>
        </div>
      </div>`;
  } else {
    $('nova-corrida-box').innerHTML = '<div style="text-align:center;padding:20px;color:var(--ink3);">Nenhum pedido no radar no momento.</div>';
  }
}

function recusar() {
  $('nova-corrida-box').innerHTML=''; showToast('Corrida recusada.');
}

async function aceitarReal() {
  if (idPedidoAtual) {
    // Altera o status no banco para "entrega" (motoboy a caminho)
    await _supa.from('stig_pedidos').update({ status: 'entrega' }).eq('db_id', idPedidoAtual);
    
    // Adiciona o frete ao saldo e simula entrega feita
    saldo += 8.50;
    $('saldo-val').textContent = 'R$ ' + saldo.toFixed(2);
    $('nova-corrida-box').innerHTML = '<div style="text-align:center;padding:20px;color:var(--ink3);">✔️ Corrida Aceita e Concluída! Frete transferido via Pix.</div>';
    
    showToast('✅ Entrega confirmada! Pix liberado!');
  }
}
</script>
</body>
</html>
